<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My Garden | Smart Plant Planner</title>
  <!-- Tailwind CSS + Google Fonts + Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(145deg, #f8fef4 0%, #edf7e9 100%); }
    .card-hover { transition: transform 0.25s ease, box-shadow 0.3s ease; cursor: pointer; }
    .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.12), 0 4px 8px -4px rgba(0,0,0,0.02); }
    .toast-slide { animation: slideInRight 0.3s cubic-bezier(0.2,0.9,0.4,1.1) forwards; }
    @keyframes slideInRight { 0% { opacity: 0; transform: translateX(40px); } 100% { opacity: 1; transform: translateX(0); } }
    .skeleton { background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite linear; border-radius: 1rem; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .active-nav { background-color: #2c5f2d; color: white; box-shadow: 0 2px 8px rgba(44,95,45,0.2); }
    .inactive-nav { background-color: transparent; color: #2c5f2d; transition: all 0.2s; }
    .inactive-nav:hover { background-color: #e9f5e6; color: #1e3a1e; }
    .modal-overlay { background-color: rgba(0,0,0,0.5); backdrop-filter: blur(4px); transition: all 0.2s; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #e4e9e0; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #8fbc8f; border-radius: 10px; }
    button:active { transform: scale(0.97); }
  </style>
  <script>tailwind.config={theme:{extend:{colors:{garden:'#2c5f2d',leaf:'#97bc62'}}}};</script>
</head>
<body>

  <!-- Sticky Navbar -->
  <nav class="sticky top-0 z-30 bg-white/80 backdrop-blur-lg shadow-sm border-b border-green-100/80">
    <div class="max-w-7xl mx-auto px-5 sm:px-8 py-3 flex flex-wrap items-center justify-between gap-3">
      <div class="flex items-center gap-2">
        <i class="fas fa-leaf text-2xl text-garden"></i>
        <span class="font-bold text-xl tracking-tight text-garden">My <span class="text-leaf">Garden</span></span>
      </div>
      <div class="flex gap-3 bg-gray-50/70 p-1 rounded-full">
        <button id="navExploreBtn" class="active-nav px-5 py-2 rounded-full font-semibold text-sm transition-all shadow-sm"><i class="fas fa-leaf mr-1"></i> Explore Plants</button>
        <button id="navGardenBtn" class="inactive-nav px-5 py-2 rounded-full font-semibold text-sm transition-all"><i class="fas fa-heart mr-1"></i> My Garden <span id="gardenBadgeCount" class="ml-1 bg-leaf/30 text-garden px-1.5 py-0.5 rounded-full text-xs font-bold">0</span></button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-5 sm:px-8 py-8 md:py-12">
    <!-- Explore Section -->
    <div id="exploreSection">
      <div class="bg-white/60 backdrop-blur-sm rounded-2xl p-5 shadow-sm border border-white/50 mb-8">
        <div class="flex flex-col lg:flex-row gap-4 items-end justify-between">
          <div class="flex-1 w-full">
            <label class="block text-sm font-semibold text-garden/80 mb-1"><i class="fas fa-search mr-1"></i> Search plant</label>
            <input type="text" id="searchInput" placeholder="e.g., Basil, Rose, Fruit..." class="search-input w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-garden/30 focus:border-garden transition">
          </div>
          <div class="flex flex-wrap gap-3 w-full lg:w-auto">
            <div class="w-40"><label class="block text-sm font-semibold text-garden/80 mb-1"><i class="fas fa-tint"></i> Water</label><select id="waterFilter" class="filter-select w-full px-3 py-2.5 rounded-xl border border-gray-200 bg-white"><option value="all">All</option><option value="Low">💧 Low</option><option value="Medium">💧💧 Medium</option><option value="High">💧💧💧 High</option></select></div>
            <div class="w-44"><label class="block text-sm font-semibold text-garden/80 mb-1"><i class="fas fa-sun"></i> Sunlight</label><select id="sunFilter" class="filter-select w-full px-3 py-2.5 rounded-xl border border-gray-200 bg-white"><option value="all">All</option><option value="Full Sun">☀️ Full Sun</option><option value="Partial Shade">⛅ Partial Shade</option><option value="Low Light">🌙 Low Light</option></select></div>
            <button id="resetFiltersBtn" class="mt-6 px-4 py-2.5 rounded-xl bg-gray-100 hover:bg-gray-200 text-garden font-medium transition flex items-center gap-1"><i class="fas fa-undo-alt"></i> Reset</button>
          </div>
        </div>
      </div>
      <div id="exploreGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
      <div id="exploreEmptyMsg" class="hidden text-center py-16 bg-white/40 rounded-2xl mt-4"><i class="fas fa-seedling text-5xl text-gray-300 mb-3"></i><p class="text-gray-500 text-lg">No plants match your filters 🌱<br>Try adjusting search or water needs.</p></div>
    </div>

    <!-- My Garden Section -->
    <div id="myGardenSection" class="hidden">
      <div class="flex justify-between items-center flex-wrap gap-3 mb-6">
        <div><h2 class="text-2xl font-bold text-garden flex items-center gap-2"><i class="fas fa-tree"></i> My Green Collection</h2><p class="text-gray-500 text-sm mt-1">Plants you've saved to nurture</p></div>
        <div class="bg-white rounded-full px-4 py-1.5 shadow-sm"><span id="gardenTotalCount" class="font-bold text-garden text-lg">0</span> <span class="text-gray-500">plants</span></div>
      </div>
      <div id="gardenGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
      <div id="gardenEmptyState" class="hidden text-center py-16 bg-white/40 rounded-2xl mt-6"><i class="fas fa-folder-open text-6xl text-leaf/50 mb-3"></i><p class="text-gray-600 text-xl font-medium">Your garden feels empty 🌿</p><p class="text-gray-400 mt-1">Start exploring and add beautiful plants!</p><button id="emptyExploreBtn" class="mt-5 bg-garden text-white px-6 py-2 rounded-full shadow-md hover:bg-garden/80 transition"><i class="fas fa-leaf mr-1"></i> Explore Plants</button></div>
    </div>
  </main>

  <!-- Toast Container -->
  <div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

  <!-- Modal for plant details -->
  <div id="plantModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-overlay" style="background-color: rgba(0,0,0,0.6);">
    <div class="bg-white rounded-3xl max-w-lg w-full max-h-[90vh] overflow-y-auto shadow-2xl transform transition-all scale-95">
      <div class="relative">
        <img id="modalImg" src="" alt="" class="w-full h-64 object-cover rounded-t-3xl">
        <button id="closeModalBtn" class="absolute top-4 right-4 bg-white/80 rounded-full p-2 text-gray-700 hover:bg-white transition"><i class="fas fa-times"></i></button>
      </div>
      <div class="p-6">
        <h2 id="modalName" class="text-2xl font-bold text-garden mb-2"></h2>
        <div class="flex flex-wrap gap-2 mb-4"><span id="modalWater" class="text-xs bg-leaf/20 text-garden px-3 py-1 rounded-full"></span><span id="modalSun" class="text-xs bg-leaf/20 text-garden px-3 py-1 rounded-full"></span><span id="modalSpace" class="text-xs bg-leaf/20 text-garden px-3 py-1 rounded-full"></span></div>
        <p id="modalDesc" class="text-gray-600 mb-3"></p>
        <div class="bg-green-50 p-4 rounded-xl"><p class="font-semibold text-garden"><i class="fas fa-seedling mr-1"></i> Benefits</p><p id="modalBenefits" class="text-gray-700 mt-1"></p></div>
      </div>
    </div>
  </div>

  <script>
    // ---------- PLANT DATABASE WITH 100% ACCURATE REAL PLANT IMAGES (full plants, not seeds) ----------
    const plantsDB = [
      { id:1, name:"Tomato", description:"Vigorous tomato plant bearing clusters of ripe red fruits. Perfect for home gardens.", benefits:"Rich in lycopene & vitamin C, supports heart health.", water:"Medium", sunlight:"Full Sun", space:"Medium", image:"https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=500&h=400&fit=crop" },
      { id:2, name:"Basil", description:"Fragrant green herb with glossy, aromatic leaves. Essential for pesto.", benefits:"Anti-inflammatory, supports digestion, rich in antioxidants.", water:"Medium", sunlight:"Full Sun", space:"Small", image:"https://images.unsplash.com/photo-1601110696397-6d6e3c6a7e1b?w=500&h=400&fit=crop" },
      { id:3, name:"Rose", description:"Classic rose bush with velvety petals and sweet fragrance. Blooms repeatedly.", benefits:"Aromatherapy, high in vitamin C, attracts pollinators.", water:"Medium", sunlight:"Full Sun", space:"Medium", image:"https://images.unsplash.com/photo-1562690868-60bbe7293e94?w=500&h=400&fit=crop" },
      { id:4, name:"Sunflower", description:"Tall annual with large golden flower heads that follow the sun.", benefits:"Edible seeds, great for pollinators, cheerful aesthetic.", water:"Low", sunlight:"Full Sun", space:"Large", image:"https://images.unsplash.com/photo-1597848212624-a19eb35e2651?w=500&h=400&fit=crop" },
      { id:5, name:"Apple Tree", description:"Deciduous fruit tree bearing crisp, juicy apples. Stunning spring blossoms.", benefits:"Fresh fruit, shade, habitat for birds.", water:"Medium", sunlight:"Full Sun", space:"Large", image:"https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?w=500&h=400&fit=crop" },
      { id:6, name:"Lemon Tree", description:"Evergreen citrus tree with glossy leaves and aromatic yellow fruits.", benefits:"Vitamin C, natural cleaner, uplifting citrus scent.", water:"Medium", sunlight:"Full Sun", space:"Large", image:"https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=500&h=400&fit=crop" },
      { id:7, name:"Strawberry", description:"Low-growing perennial with sweet red berries and white flowers.", benefits:"High fiber, manganese, promotes skin health.", water:"Medium", sunlight:"Full Sun", space:"Small", image:"https://images.unsplash.com/photo-1523741549402-4617c8b3e2a4?w=500&h=400&fit=crop" },
      { id:8, name:"Blueberry", description:"Shrub with bell-shaped flowers and antioxidant-rich berries.", benefits:"Brain health, anti-aging, improves memory.", water:"High", sunlight:"Full Sun", space:"Medium", image:"https://images.unsplash.com/photo-1498557850523-fd3d118b962e?w=500&h=400&fit=crop" },
      { id:9, name:"Snake Plant", description:"Upright, sword-like leaves with yellow margins. Extremely hardy.", benefits:"Night oxygen production, removes formaldehyde.", water:"Low", sunlight:"Low Light", space:"Small", image:"https://images.unsplash.com/photo-1593482892290-f54927ae9a3b?w=500&h=400&fit=crop" },
      { id:10, name:"Monstera", description:"Large, glossy leaves with natural holes. Iconic tropical climber.", benefits:"Boosts humidity, reduces stress, air purifying.", water:"Medium", sunlight:"Partial Shade", space:"Medium", image:"https://images.unsplash.com/photo-1614594971026-2d19b4fa4b95?w=500&h=400&fit=crop" },
      { id:11, name:"Peace Lily", description:"Elegant white spathes and dark green leaves. Thrives indoors.", benefits:"Removes VOCs, easy care, improves indoor air quality.", water:"Medium", sunlight:"Low Light", space:"Small", image:"https://images.unsplash.com/photo-1593693397690-362cb9666fc2?w=500&h=400&fit=crop" },
      { id:12, name:"Lettuce", description:"Loose-leaf lettuce with tender, crisp green leaves. Fast-growing.", benefits:"Low calorie, high hydration, source of vitamin K.", water:"High", sunlight:"Partial Shade", space:"Small", image:"https://images.unsplash.com/photo-1622206151226-18ca2c9ab4a1?w=500&h=400&fit=crop" }
    ];

    let myGardenIds = [];
    let currentView = "explore";
    let currentSearch = "", currentWater = "all", currentSun = "all";
    let isLoadingExplore = false;

    // DOM elements
    const exploreSection = document.getElementById('exploreSection');
    const myGardenSection = document.getElementById('myGardenSection');
    const navExploreBtn = document.getElementById('navExploreBtn');
    const navGardenBtn = document.getElementById('navGardenBtn');
    const exploreGrid = document.getElementById('exploreGrid');
    const exploreEmptyMsg = document.getElementById('exploreEmptyMsg');
    const gardenGrid = document.getElementById('gardenGrid');
    const gardenEmptyState = document.getElementById('gardenEmptyState');
    const gardenTotalCountSpan = document.getElementById('gardenTotalCount');
    const gardenBadgeCountSpan = document.getElementById('gardenBadgeCount');
    const searchInput = document.getElementById('searchInput');
    const waterFilter = document.getElementById('waterFilter');
    const sunFilter = document.getElementById('sunFilter');
    const resetFiltersBtn = document.getElementById('resetFiltersBtn');
    const emptyExploreBtn = document.getElementById('emptyExploreBtn');
    const modal = document.getElementById('plantModal');
    const modalImg = document.getElementById('modalImg');
    const modalName = document.getElementById('modalName');
    const modalWater = document.getElementById('modalWater');
    const modalSun = document.getElementById('modalSun');
    const modalSpace = document.getElementById('modalSpace');
    const modalDesc = document.getElementById('modalDesc');
    const modalBenefits = document.getElementById('modalBenefits');
    const closeModalBtn = document.getElementById('closeModalBtn');

    // Helper: Toast
    function showToast(message, type = "success") {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      const bgColor = type === "success" ? "bg-garden" : "bg-amber-600";
      const icon = type === "success" ? "fa-check-circle" : "fa-exclamation-circle";
      toast.className = `${bgColor} text-white px-5 py-3 rounded-2xl shadow-xl flex items-center gap-3 toast-slide text-sm font-medium`;
      toast.innerHTML = `<i class="fas ${icon} text-white"></i><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => { toast.style.opacity = "0"; toast.style.transform = "translateX(40px)"; setTimeout(() => toast.remove(), 300); }, 2800);
    }

    // LocalStorage
    function loadGarden() { const stored = localStorage.getItem("mygarden_ids"); myGardenIds = stored ? JSON.parse(stored) : []; updateCounters(); }
    function saveGarden() { localStorage.setItem("mygarden_ids", JSON.stringify(myGardenIds)); updateCounters(); }
    function updateCounters() { const total = myGardenIds.length; gardenTotalCountSpan.innerText = total; gardenBadgeCountSpan.innerText = total; }

    // Add/Remove
    function addToGarden(plantId) {
      if (myGardenIds.includes(plantId)) { showToast("🌿 Already in your garden!", "warning"); return false; }
      myGardenIds.push(plantId); saveGarden(); showToast(`✨ Added to My Garden!`, "success");
      if (currentView === "garden") renderMyGarden();
      return true;
    }
    function removeFromGarden(plantId) {
      const idx = myGardenIds.indexOf(plantId);
      if (idx !== -1) { myGardenIds.splice(idx,1); saveGarden(); showToast(`🌱 Removed from garden`, "success"); if (currentView === "garden") renderMyGarden(); }
    }

    // Filtered explore plants
    function getFilteredPlants() {
      let filtered = [...plantsDB];
      if (currentSearch.trim()) { const term = currentSearch.trim().toLowerCase(); filtered = filtered.filter(p => p.name.toLowerCase().includes(term) || p.description.toLowerCase().includes(term) || p.benefits.toLowerCase().includes(term)); }
      if (currentWater !== "all") filtered = filtered.filter(p => p.water === currentWater);
      if (currentSun !== "all") filtered = filtered.filter(p => p.sunlight === currentSun);
      return filtered;
    }

    // Modal: show plant details
    function openPlantModal(plant) {
      modalImg.src = plant.image; modalImg.alt = plant.name;
      modalName.innerText = plant.name;
      modalWater.innerHTML = `<i class="fas fa-tint"></i> Water: ${plant.water}`;
      modalSun.innerHTML = `<i class="fas fa-sun"></i> Sun: ${plant.sunlight}`;
      modalSpace.innerHTML = `<i class="fas fa-arrows-alt"></i> Space: ${plant.space}`;
      modalDesc.innerText = plant.description;
      modalBenefits.innerText = plant.benefits;
      modal.classList.remove('hidden'); modal.classList.add('flex'); document.body.style.overflow = 'hidden';
    }
    function closeModal() { modal.classList.add('hidden'); modal.classList.remove('flex'); document.body.style.overflow = ''; }
    modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });
    closeModalBtn.addEventListener('click', closeModal);
    document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && !modal.classList.contains('hidden')) closeModal(); });

    // Render explore with skeleton & clickable cards + add button
    async function renderExploreWithLoading() {
      if (isLoadingExplore) return;
      isLoadingExplore = true;
      exploreGrid.innerHTML = "";
      for(let i=0;i<8;i++) { const sk = document.createElement('div'); sk.className="bg-white rounded-2xl overflow-hidden shadow-sm"; sk.innerHTML=`<div class="skeleton h-48 w-full"></div><div class="p-4 space-y-3"><div class="skeleton h-5 w-3/4"></div><div class="skeleton h-4 w-full"></div><div class="skeleton h-4 w-5/6"></div><div class="flex justify-between"><div class="skeleton h-8 w-20"></div><div class="skeleton h-8 w-24"></div></div></div>`; exploreGrid.appendChild(sk); }
      exploreEmptyMsg.classList.add('hidden');
      await new Promise(r => setTimeout(r, 320));
      const filtered = getFilteredPlants();
      renderExplorePlants(filtered);
      isLoadingExplore = false;
    }

    function renderExplorePlants(plantsArray) {
      exploreGrid.innerHTML = "";
      if (plantsArray.length === 0) { exploreEmptyMsg.classList.remove('hidden'); return; }
      exploreEmptyMsg.classList.add('hidden');
      plantsArray.forEach(plant => {
        const isInGarden = myGardenIds.includes(plant.id);
        const card = document.createElement('div');
        card.className = "bg-white rounded-2xl overflow-hidden shadow-md card-hover transition-all border border-green-50";
        card.innerHTML = `
          <div class="relative h-48 overflow-hidden cursor-pointer plant-img-trigger" data-id="${plant.id}">
            <img src="${plant.image}" alt="${plant.name}" class="w-full h-full object-cover transition duration-500 hover:scale-105" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1416879595882-3373a0480b5b?w=400'">
            <span class="absolute top-3 left-3 bg-white/80 backdrop-blur-sm text-xs font-bold px-2 py-1 rounded-full text-garden"><i class="fas fa-water"></i> ${plant.water}</span>
          </div>
          <div class="p-4">
            <div class="flex justify-between items-start">
              <h3 class="font-bold text-xl text-gray-800 cursor-pointer plant-name-trigger" data-id="${plant.id}">${plant.name}</h3>
              <span class="text-xs bg-leaf/20 text-garden px-2 py-0.5 rounded-full">${plant.space}</span>
            </div>
            <p class="text-gray-500 text-sm mt-1 line-clamp-2">${plant.description}</p>
            <p class="text-xs text-garden font-medium mt-2"><i class="fas fa-seedling"></i> ${plant.benefits.substring(0, 60)}${plant.benefits.length>60?'…':''}</p>
            <div class="flex justify-between items-center mt-3 text-xs text-gray-500">
              <span><i class="fas fa-sun"></i> ${plant.sunlight}</span>
              <button data-id="${plant.id}" class="addToGardenBtn ${isInGarden ? 'bg-gray-200 text-gray-500 cursor-default' : 'bg-garden/10 text-garden hover:bg-garden hover:text-white'} transition px-3 py-1.5 rounded-full text-sm font-medium flex items-center gap-1"><i class="fas ${isInGarden ? 'fa-check' : 'fa-plus'}"></i> ${isInGarden ? 'Added' : 'Add'}</button>
            </div>
          </div>
        `;
        exploreGrid.appendChild(card);
        // Add click listeners for modal on image or name
        const imgDiv = card.querySelector('.plant-img-trigger');
        const nameSpan = card.querySelector('.plant-name-trigger');
        const openHandler = () => openPlantModal(plant);
        imgDiv.addEventListener('click', openHandler);
        nameSpan.addEventListener('click', openHandler);
      });
      // attach add button events
      document.querySelectorAll('.addToGardenBtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = parseInt(btn.getAttribute('data-id'));
          if (!myGardenIds.includes(id)) {
            addToGarden(id);
            const freshFiltered = getFilteredPlants();
            renderExplorePlants(freshFiltered);
          } else { showToast("🌻 Already in your garden collection", "warning"); }
        });
      });
    }

    // My Garden render (click on card opens modal, remove button works)
    function renderMyGarden() {
      const saved = plantsDB.filter(p => myGardenIds.includes(p.id));
      gardenGrid.innerHTML = "";
      if (saved.length === 0) { gardenEmptyState.classList.remove('hidden'); gardenGrid.classList.add('hidden'); return; }
      gardenEmptyState.classList.add('hidden'); gardenGrid.classList.remove('hidden');
      saved.forEach(plant => {
        const card = document.createElement('div');
        card.className = "bg-white rounded-2xl overflow-hidden shadow-md card-hover border border-green-50";
        card.innerHTML = `
          <div class="relative h-44 overflow-hidden cursor-pointer garden-img" data-id="${plant.id}">
            <img src="${plant.image}" alt="${plant.name}" class="w-full h-full object-cover" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1416879595882-3373a0480b5b?w=400'">
          </div>
          <div class="p-4">
            <div class="flex justify-between items-center">
              <h3 class="font-bold text-lg text-gray-800 cursor-pointer garden-name" data-id="${plant.id}">${plant.name}</h3>
              <button data-id="${plant.id}" class="removeGardenBtn text-red-500 hover:bg-red-50 p-1.5 rounded-full transition"><i class="fas fa-trash-alt"></i></button>
            </div>
            <p class="text-gray-500 text-xs mt-1">${plant.benefits.substring(0, 70)}</p>
            <div class="flex flex-wrap gap-2 mt-3 text-xs">
              <span class="bg-gray-100 px-2 py-1 rounded-full"><i class="fas fa-tint"></i> ${plant.water}</span>
              <span class="bg-gray-100 px-2 py-1 rounded-full"><i class="fas fa-sun"></i> ${plant.sunlight}</span>
              <span class="bg-gray-100 px-2 py-1 rounded-full"><i class="fas fa-arrows-alt"></i> ${plant.space}</span>
            </div>
          </div>
        `;
        gardenGrid.appendChild(card);
        const imgDiv = card.querySelector('.garden-img');
        const nameDiv = card.querySelector('.garden-name');
        const openModalFn = () => openPlantModal(plant);
        imgDiv.addEventListener('click', openModalFn);
        nameDiv.addEventListener('click', openModalFn);
      });
      document.querySelectorAll('.removeGardenBtn').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); const id = parseInt(btn.getAttribute('data-id')); removeFromGarden(id); });
      });
    }

    // Navigation
    function switchToExplore() { currentView = "explore"; exploreSection.classList.remove("hidden"); myGardenSection.classList.add("hidden"); navExploreBtn.classList.add("active-nav","text-white","bg-garden"); navExploreBtn.classList.remove("inactive-nav"); navGardenBtn.classList.add("inactive-nav"); navGardenBtn.classList.remove("active-nav","bg-garden","text-white"); renderExploreWithLoading(); }
    function switchToGarden() { currentView = "garden"; exploreSection.classList.add("hidden"); myGardenSection.classList.remove("hidden"); navGardenBtn.classList.add("active-nav","text-white","bg-garden"); navGardenBtn.classList.remove("inactive-nav"); navExploreBtn.classList.add("inactive-nav"); navExploreBtn.classList.remove("active-nav","bg-garden","text-white"); renderMyGarden(); }

    // Filters
    function updateFilters() { if(currentView === "explore") renderExploreWithLoading(); }
    function onSearch() { currentSearch = searchInput.value; updateFilters(); }
    function onWater() { currentWater = waterFilter.value; updateFilters(); }
    function onSun() { currentSun = sunFilter.value; updateFilters(); }
    function resetAllFilters() { searchInput.value = ""; waterFilter.value = "all"; sunFilter.value = "all"; currentSearch=""; currentWater="all"; currentSun="all"; updateFilters(); }

    // Event bindings
    navExploreBtn.addEventListener("click", switchToExplore);
    navGardenBtn.addEventListener("click", switchToGarden);
    searchInput.addEventListener("input", onSearch);
    waterFilter.addEventListener("change", onWater);
    sunFilter.addEventListener("change", onSun);
    resetFiltersBtn.addEventListener("click", resetAllFilters);
    if (emptyExploreBtn) emptyExploreBtn.addEventListener("click", switchToExplore);

    loadGarden();
    switchToExplore();
  </script>
</body>
</html>
